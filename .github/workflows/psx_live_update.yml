name: Run PSX Live Market Updater

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: psx-live-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas requests playwright

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run PSX live updater
        run: |
          python push_live_snapshot.py

      - name: Save latest CSV permanently in GitHub
        run: |
          python persist_latest_csv.py

      - name: Verify latest CSV exists
        run: |
          echo "Checking generated latest CSV..."
          ls -lah data/latest || true
          test -s data/latest/psx_all_index_constituents.csv

      - name: Commit latest CSV if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f data/latest/psx_all_index_constituents.csv

          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
          else
            git commit -m "Update latest PSX live CSV"
            git push
          fi
