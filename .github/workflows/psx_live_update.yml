name: PSX Live Market Updater

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-psx-live-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run PSX scraper and upload snapshot
        env:
          UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
          BACKEND_URL: https://azkaalii-psx-ai-backend.hf.space
        run: |
          python push_live_snapshot.py

      - name: Save latest CSV permanently in GitHub
        run: |
          python persist_latest_csv.py

      - name: Verify latest CSV exists
        run: |
          echo "Checking generated latest CSV..."
          ls -lah data/latest || true
          test -s data/latest/psx_all_index_constituents.csv

      - name: Commit latest CSV if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f data/latest/psx_all_index_constituents.csv

          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
          else
            git commit -m "Update latest PSX live CSV"
            git push
          fi
