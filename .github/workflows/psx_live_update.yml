name: Run PSX Live Market Updater

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: psx-live-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check PSX market update window
        id: window
        run: |
          PKT_DAY=$(TZ='Asia/Karachi' date +%u)
          PKT_TIME=$(TZ='Asia/Karachi' date +%H%M)
          PKT_NOW=$(TZ='Asia/Karachi' date)

          echo "Pakistan time: $PKT_NOW"
          echo "Day: $PKT_DAY"
          echo "Time: $PKT_TIME"

          if [ "$PKT_DAY" -ge 6 ]; then
            echo "⏸️ Weekend in Pakistan. Skipping PSX scraping."
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$PKT_TIME" -lt 0800 ] || [ "$PKT_TIME" -gt 1630 ]; then
            echo "⏸️ Outside PSX update window. Skipping PSX scraping."
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "✅ Inside PSX update window. Proceeding."
          echo "allowed=true" >> "$GITHUB_OUTPUT"

      - name: Checkout repo
        if: steps.window.outputs.allowed == 'true'
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        if: steps.window.outputs.allowed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: steps.window.outputs.allowed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas requests playwright

      - name: Install Playwright Chromium
        if: steps.window.outputs.allowed == 'true'
        run: |
          python -m playwright install --with-deps chromium

      - name: Run PSX live updater
        if: steps.window.outputs.allowed == 'true'
        run: |
          python push_live_snapshot.py

      - name: Save latest CSV permanently in GitHub
        if: steps.window.outputs.allowed == 'true'
        run: |
          python persist_latest_csv.py

      - name: Verify latest CSV exists
        if: steps.window.outputs.allowed == 'true'
        run: |
          echo "Checking generated latest CSV..."
          ls -lah data/latest || true
          test -s data/latest/psx_all_index_constituents.csv

      - name: Commit latest CSV if changed
        if: steps.window.outputs.allowed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "Saving generated CSV before syncing repo..."
          cp data/latest/psx_all_index_constituents.csv /tmp/psx_all_index_constituents.csv

          echo "Syncing with latest origin/main..."
          git fetch origin main
          git reset --hard origin/main

          mkdir -p data/latest
          cp /tmp/psx_all_index_constituents.csv data/latest/psx_all_index_constituents.csv

          git add -f data/latest/psx_all_index_constituents.csv

          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
          else
            git commit -m "Update latest PSX live CSV"
            git push origin main
          fi
