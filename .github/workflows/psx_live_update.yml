name: Run PSX Live Market Updater

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: psx-live-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas requests playwright

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run PSX live updater
        run: |
          python push_live_snapshot.py

      - name: Save latest CSV permanently in GitHub
        run: |
          python persist_latest_csv.py

      - name: Verify latest CSV exists
        run: |
          echo "Checking generated latest CSV..."
          ls -lah data/latest || true
          test -s data/latest/psx_all_index_constituents.csv

      - name: Commit latest CSV if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "Saving generated CSV before syncing repo..."
          cp data/latest/psx_all_index_constituents.csv /tmp/psx_all_index_constituents.csv

          echo "Syncing with latest origin/main..."
          git fetch origin main
          git reset --hard origin/main

          mkdir -p data/latest
          cp /tmp/psx_all_index_constituents.csv data/latest/psx_all_index_constituents.csv

          git add -f data/latest/psx_all_index_constituents.csv

          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
          else
            git commit -m "Update latest PSX live CSV"
            git push origin main
          fi
